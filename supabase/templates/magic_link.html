<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#ECE6D9;font-family:'Figtree','Helvetica Neue',Arial,sans-serif">
  <div style="max-width:520px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden">
    <div style="background:#18222D;padding:24px 32px">
      <p style="margin:0;font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:20px;font-weight:700;color:#F4F0E8">Deck<span style="color:#B45F42">Shark</span></p>
      <p style="margin:4px 0 0;font-size:12px;color:#8FBFB8">Trade decks. Not cards.</p>
    </div>
    <div style="padding:32px">
      <p style="font-size:20px;font-weight:700;margin:0 0 8px;color:#18222D">Sign in to DeckShark</p>
      <p style="color:#4A5562;margin:0 0 24px;line-height:1.5">
        Click the button below to sign in to your DeckShark account. This link expires in 1 hour.
      </p>
      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#B45F42;color:#F4F0E8;text-decoration:none;padding:11px 22px;border-radius:5px;font-family:'Space Grotesk','Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:700">Sign in</a>
      <p style="margin:24px 0 0;font-size:13px;color:#5B6675;line-height:1.5">
        If you didn't request this link, you can safely ignore this email.
      </p>
    </div>
    <div style="padding:16px 32px;border-top:1px solid #DAD2C2">
      <p style="margin:0;font-size:12px;color:#5B6675">DeckShark &middot; Commander deck trading, in person</p>
    </div>
  </div>
</body>
</html>
